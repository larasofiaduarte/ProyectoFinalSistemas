<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Calendario</title>

  <!-- FullCalendar 6 via CDN requiere conexión a internet -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0;}
    html, body { background: rgb(250, 250, 250); margin: 0; padding: 0; font-family: sans-serif; }
    html.dark-mode, body.dark-mode { background: rgb(43, 43, 45) !important; }
    #calendar { height: calc(100vh - 20px); padding: 10px; background: transparent; }
    
    .fc-scrollgrid,
    .fc-view-harness,
    .fc-scroller {
      background: transparent !important;
    }
    .fc {
      background: rgb(250, 250, 250);
      border-radius: 12px;
      overflow: hidden;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .fc td,
    .fc th,
    .fc .fc-daygrid-day-frame,
    .fc .fc-timegrid-slot,
    .fc .fc-scrollgrid-section > td {
      background: transparent !important;
    }

    .dark-mode .fc {
      background: rgb(43, 43, 45) !important;
      color: rgb(252, 252, 252) !important;
    }

    .dark-mode .fc-theme-standard td,
    .dark-mode .fc-theme-standard th,
    .dark-mode .fc-theme-standard .fc-scrollgrid {
      border-color: rgb(76, 76, 79) !important;
    }

    .dark-mode .fc-col-header-cell,
    .dark-mode .fc-timegrid-slot,
    .dark-mode .fc-daygrid-day {
      background: rgb(43, 43, 45) !important;
    }

    .dark-mode .fc-toolbar-title,
    .dark-mode .fc-col-header-cell-cushion,
    .dark-mode .fc-timegrid-slot-label-cushion,
    .dark-mode .fc-daygrid-day-number {
      color: rgb(252, 252, 252) !important;
    }

    .fc-toolbar-chunk {
      display: flex;
      gap: 10px;
    }

    .fc-button-group .fc-button {
      margin-right: 6px;
    }

    .fc-button-group .fc-button:last-child {
      margin-right: 0;
    }

    .fc-button {
      background-color: rgb(127, 52, 201) !important;
      color: rgb(252, 252, 252) !important;
      border: none !important;
      border-radius: 8px !important;
      padding: 6px 12px !important;
      transition: background-color 0.2s ease !important;
    }

    .fc-button:hover {
      background-color: rgb(175, 119, 230) !important;
      color: rgb(252, 252, 252) !important;
    }

    .fc-button:focus {
      box-shadow: none !important;
    }

  </style>
</head>
<body>

  <div id="calendar"></div>

  <script>
    var calendar = null;

    document.addEventListener('DOMContentLoaded', function () {
      var calendarEl = document.getElementById('calendar');

      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'es',
        locales: 'all',
        headerToolbar: {
          left:   'prev,next today',
          center: 'title',
          right:  'dayGridMonth,timeGridWeek,timeGridDay'
        },
        buttonText: {
          today:  'Hoy',
          month:  'Mes',
          week:   'Semana',
          day:    'Día'
        },
        slotMinTime: '08:00:00',
        slotMaxTime: '21:00:00',
        allDaySlot: false,

        // Carga los turnos del empleado logueado desde el servidor local
        events: {
          url: 'http://localhost:8080/turnos',
          failure: function () {
            console.error('[Calendar] No se pudo conectar con el servidor de turnos');
          }
        },

        eventClick: function (info) {
          if (window.javaBridge) {
            window.javaBridge.onEventClicked(String(info.event.id));
          }
        }
      });

      calendar.render();
      console.log('[Calendar] FullCalendar inicializado');

      // Notifica al bridge Java si ya está disponible
      if (window.javaBridge) {
        window.javaBridge.onCalendarReady();
      }
    });

    /**
     * Llamado desde Java una vez que el bridge está inyectado.
     * Garantiza que onCalendarReady() se dispara aunque el DOM ya cargó.
     */
    function onJavaBridgeReady() {
      console.log('[Calendar] Bridge Java disponible');
      if (window.javaBridge) {
        window.javaBridge.onCalendarReady();
      }
    }

    /**
     * Recibe un array de eventos desde Java y los carga en el calendario.
     * Formato esperado: [{ id, title, start, end, color? }, ...]
     * Implementación real en la siguiente fase.
     *
     * @param {Array} events
     */
    // Llamado desde Java para sincronizar el tema de la app con el calendario
    function setTheme(isDark) {
      if (isDark) {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }
    }

    function renderEvents(events) {
      if (!calendar) {
        console.warn('[Calendar] renderEvents llamado antes de que el calendario esté listo');
        return;
      }
      calendar.removeAllEvents();
      if (events && events.length > 0) {
        calendar.addEventSource(events);
      }
      console.log('[Calendar] Eventos cargados: ' + (events ? events.length : 0));
    }
  </script>

</body>
</html>
